<div class="content-header">
  <h2>Gestión de Tickets</h2>
  <button mat-raised-button color="primary" (click)="openCreateDialog()">
    <mat-icon>add</mat-icon> Nuevo Ticket
  </button>

</div>

<div class="mat-elevation-z8 table-container">
  <table mat-table [dataSource]="tickets" matSort>

    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
      <td mat-cell *matCellDef="let row"> {{ row.id.substring(0, 8) }}... </td>
    </ng-container>

    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Título </th>
      <td mat-cell *matCellDef="let row"> {{ row.title }} </td>
    </ng-container>

    <ng-container matColumnDef="event">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Evento </th>
      <td mat-cell *matCellDef="let row"> {{ row.eventName || 'N/A' }} </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Estado </th>
      <td mat-cell *matCellDef="let row">
        <mat-chip-set>
          <mat-chip [color]="getStatusColor(row.status)" selected>
            {{ row.status }}
          </mat-chip>
        </mat-chip-set>
      </td>
    </ng-container>

    <ng-container matColumnDef="assignedTo">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Asignado a </th>
      <td mat-cell *matCellDef="let row"> {{ row.assignedToName || 'Sin asignar' }} </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Acciones </th>
      <td mat-cell *matCellDef="let row">
        <button mat-icon-button [matMenuTriggerFor]="menu">
          <mat-icon>more_vert</mat-icon>
        </button>
        <mat-menu #menu="matMenu">
          <button mat-menu-item (click)="openDetail(row.id)">
            <mat-icon>visibility</mat-icon> Ver Detalle
          </button>
          <button mat-menu-item *ngIf="authService.isAdmin() || authService.currentUser()?.role === 'Supervisor'">
            <mat-icon>person_add</mat-icon> Asignar
          </button>
          <button mat-menu-item color="warn" *ngIf="authService.isAdmin()" (click)="deleteTicket(row.id)">
            <mat-icon>delete</mat-icon> Eliminar
          </button>
        </mat-menu>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <!-- Row shown when there is no matching data. -->
    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" colspan="6">No hay tickets disponibles.</td>
    </tr>
  </table>

  <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Seleccionar página"></mat-paginator>
</div>
