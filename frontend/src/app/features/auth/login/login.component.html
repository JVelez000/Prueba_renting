<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Eventia S.A.S.</mat-card-title>
      <mat-card-subtitle>Gestión de Tickets</mat-card-subtitle>
    </mat-card-header>

    <mat-progress-bar *ngIf="loading" mode="indeterminate"></mat-progress-bar>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Correo electrónico</mat-label>
          <input matInput formControlName="email" type="email" placeholder="ejemplo@eventia.com">
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">El correo es obligatorio</mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Formato de correo inválido</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput formControlName="password" type="password">
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">La contraseña es obligatoria</mat-error>
          <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">Mínimo 6 caracteres</mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" class="full-width login-button" type="submit"
          [disabled]="loginForm.invalid || loading">
          {{ loading ? 'Iniciando...' : 'Iniciar Sesión' }}
        </button>

        <div class="register-link">
          ¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
