<div class="register-container">
  <mat-card class="register-card">
    <mat-card-header>
      <mat-card-title>Eventia S.A.S.</mat-card-title>
      <mat-card-subtitle>Crear cuenta nueva</mat-card-subtitle>
    </mat-card-header>

    <mat-progress-bar *ngIf="loading" mode="indeterminate"></mat-progress-bar>

    <mat-card-content>
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nombre Completo</mat-label>
          <input matInput formControlName="name" placeholder="Ej: Juan Pérez">
          <mat-error *ngIf="registerForm.get('name')?.hasError('required')">El nombre es obligatorio</mat-error>
          <mat-error *ngIf="registerForm.get('name')?.hasError('minlength')">Mínimo 3 caracteres</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Correo electrónico</mat-label>
          <input matInput formControlName="email" type="email" placeholder="ejemplo@eventia.com">
          <mat-error *ngIf="registerForm.get('email')?.hasError('required')">El correo es obligatorio</mat-error>
          <mat-error *ngIf="registerForm.get('email')?.hasError('email')">Formato de correo inválido</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput formControlName="password" type="password">
          <mat-error *ngIf="registerForm.get('password')?.hasError('required')">La contraseña es obligatoria</mat-error>
          <mat-error *ngIf="registerForm.get('password')?.hasError('minlength')">Mínimo 6 caracteres</mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" class="full-width register-button" type="submit"
          [disabled]="registerForm.invalid || loading">
          {{ loading ? 'Registrando...' : 'Registrarse' }}
        </button>

        <div class="login-link">
          ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión aquí</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
