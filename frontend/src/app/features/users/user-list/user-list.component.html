<div class="content-header">
  <h2>Gestión de Usuarios</h2>
</div>

<div class="mat-elevation-z8 table-container">
  <table mat-table [dataSource]="users">

    <!-- Nombre -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Nombre </th>
      <td mat-cell *matCellDef="let row"> {{ row.name }} </td>
    </ng-container>

    <!-- Email -->
    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef> Email </th>
      <td mat-cell *matCellDef="let row"> {{ row.email }} </td>
    </ng-container>

    <!-- Rol con Edición Dinámica -->
    <ng-container matColumnDef="role">
      <th mat-header-cell *matHeaderCellDef> Rol </th>
      <td mat-cell *matCellDef="let row">
        <ng-container *ngIf="authService.isAdmin(); else readonlyRole">
          <mat-form-field appearance="outline" class="role-select">
            <mat-select [value]="row.role" (selectionChange)="onRoleChange(row, $event.value)">
              <mat-option *ngFor="let r of availableRoles" [value]="r">{{ r }}</mat-option>
            </mat-select>
          </mat-form-field>
        </ng-container>
        <ng-template #readonlyRole>
          <mat-chip-set>
            <mat-chip [color]="getRoleColor(row.role)" selected>{{ row.role }}</mat-chip>
          </mat-chip-set>
        </ng-template>
      </td>
    </ng-container>

    <!-- Estado -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Estado </th>
      <td mat-cell *matCellDef="let row">
        <mat-chip-set>
          <mat-chip [color]="row.isActive ? 'primary' : 'warn'" selected>
            {{ row.isActive ? 'Activo' : 'Inactivo' }}
          </mat-chip>
        </mat-chip-set>
      </td>
    </ng-container>

    <!-- Acciones -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Acciones </th>
      <td mat-cell *matCellDef="let row">
        <button *ngIf="authService.isAdmin()" mat-icon-button [color]="row.isActive ? 'warn' : 'primary'"
          (click)="toggleUserStatus(row)" [matTooltip]="row.isActive ? 'Deshabilitar usuario' : 'Habilitar usuario'">
          <mat-icon>{{ row.isActive ? 'block' : 'check_circle' }}</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <!-- Estados de Carga/Vacío -->
  <div *ngIf="loading" class="loading-row">Cargando usuarios...</div>
  <div *ngIf="!loading && users.length === 0" class="empty-row">No hay usuarios registrados.</div>
</div>
