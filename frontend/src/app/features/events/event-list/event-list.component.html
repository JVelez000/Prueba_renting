<div class="content-header">
  <h2>Gestión de Eventos</h2>
  <button mat-raised-button color="primary" (click)="openCreateDialog()"
    *ngIf="authService.isAdmin() || authService.currentUser()?.role === 'Supervisor'">
    <mat-icon>add</mat-icon> Nuevo Evento
  </button>

</div>

<div class="mat-elevation-z8 table-container">
  <table mat-table [dataSource]="events">

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Nombre </th>
      <td mat-cell *matCellDef="let row"> {{ row.name }} </td>
    </ng-container>

    <ng-container matColumnDef="eventDate">
      <th mat-header-cell *matHeaderCellDef> Fecha </th>
      <td mat-cell *matCellDef="let row"> {{ row.eventDate | date:'mediumDate' }} </td>
    </ng-container>

    <ng-container matColumnDef="location">
      <th mat-header-cell *matHeaderCellDef> Ubicación </th>
      <td mat-cell *matCellDef="let row"> {{ row.location }} </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Acciones </th>
      <td mat-cell *matCellDef="let row">
        <button mat-icon-button color="primary"
          *ngIf="authService.isAdmin() || authService.currentUser()?.role === 'Supervisor'">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" *ngIf="authService.isAdmin()" (click)="deleteEvent(row.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
